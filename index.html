<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PULSO | Diario Digital Editorial</title>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<!-- ===================== -->
<!-- TEMPERATURAS ARGENTINA -->
<!-- ===================== -->

<div class="live-ticker">

    <span class="ticker-badge">

        EN VIVO

    </span>

    <div class="ticker-text">

        <p id="argentina-temperaturas">

            Cargando temperaturas de Argentina...

        </p>

    </div>

</div>

<!-- ===================== -->
<!-- ÚLTIMA HORA -->
<!-- ===================== -->

<section
class="breaking-news"
id="breaking-news">

    <div class="breaking-label">

        ● ÚLTIMA HORA

    </div>

    <div
    class="breaking-text"
    id="breaking-text">

        Consultando agencias internacionales...

    </div>

</section>



</section>

<!-- ===================== -->
<!-- HEADER -->
<!-- ===================== -->

<header class="main-header">

    <div class="header-top">

        <div class="logo-area">

            <div class="logo">

                PULSO

            </div>

            <button
            id="dark-mode-toggle"
            class="dark-mode-toggle">

                ◐

            </button>

        </div>

        <div
        class="date-container"
        id="current-date">

        </div>

        <div class="search-bar">

            <input
            type="text"
            id="search-input"
            placeholder="Buscar noticias...">

            <button>

                🔍

            </button>

        </div>

    </div>

    <!-- ===================== -->
    <!-- CATEGORÍAS -->
    <!-- ===================== -->

    <nav class="categories-nav"> 

        <button
        class="cat-btn"
        data-category="general">

            Noticias Generales

        </button>

        <button
        class="cat-btn"
        data-category="sports">

            Deportes

        </button>

        <button
        class="cat-btn"
        data-category="technology">

            Tecnología

        </button>

        <button
        class="cat-btn"
        data-category="science">

            Ciencia

        </button>

        <button
        class="cat-btn"
        data-category="business">

            Economía

        </button>

        <button
        class="cat-btn"
        data-category="weather">

            Clima

        </button>

        <button
        class="cat-btn"
        data-id="favorites">

            Colecciones Guardadas

        </button>

    </nav>

</header>

<!-- ===================== -->
<!-- CABECERA EDITORIAL -->
<!-- ===================== -->

<section
class="editorial-banner">

    <div class="editorial-content">

        <span>

            EDICIÓN DIGITAL

        </span>

        <h2>

            Las historias más importantes del día

        </h2>

        <p>

           

        </p>

    </div>

</section>

<!-- ===================== -->
<!-- PORTADA -->
<!-- ===================== -->

<main class="homepage-layout">

    <!-- NOTICIA PRINCIPAL -->

    <section
    class="hero-featured"
    id="featured-section">

        <div class="loader">

            Construyendo portada...

        </div>

    </section>

    <!-- DOS NOTICIAS SECUNDARIAS -->

    <aside
    class="secondary-news"
    id="secondary-news">

    </aside>

</main>

<!-- ===================== -->
<!-- RESTO DE NOTICIAS -->
<!-- ===================== -->

<section class="news-flow">

    <div
    class="grid-stories"
    id="grid-stories-section">

    </div>

</section>

<!-- ===================== -->
<!-- DESTACADAS -->
<!-- ===================== -->

<section class="carousel-section">

    <h3 class="section-title">

        Otras Historias Destacadas

    </h3>

    <div
    class="carousel-grid"
    id="carousel-track">

    </div>

</section>

<!-- ===================== -->
<!-- FOOTER -->
<!-- ===================== -->

<footer class="footer">

    <div class="footer-logo">

        PULSO

    </div>

    <p>

        Diario digital experimental · Noticias actualizadas automáticamente.

    </p>

</footer>

<script src="js/app.js"></script>

</body>
</html>
